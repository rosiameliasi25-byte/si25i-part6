<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Activity Tracker</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      color: #0f172a;
    }

    /* BACKGROUND */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('profile.jpg') center / cover no-repeat;
      filter: blur(14px) brightness(0.55);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.45);
      z-index: -1;
    }

    /* GLASS WRAPPER */
    .app {
      max-width: 1100px;
      margin: 80px auto;
      padding: 56px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(30px) saturate(1.25);
      -webkit-backdrop-filter: blur(30px) saturate(1.25);
      border-radius: 32px;
      box-shadow: 0 40px 120px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.55);
      animation: fadeUp 1s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    header {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 48px;
      align-items: center;
      margin-bottom: 64px;
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 5vw, 60px);
      color: #1e3a8a;
      margin-bottom: 14px;
    }

    .brand p {
      font-size: 15px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #334155;
    }

    .photos {
      display: flex;
      gap: 18px;
    }

    .photos img {
      width: 100%;
      max-width: 160px;
      border-radius: 18px;
      box-shadow: 0 18px 36px rgba(0,0,0,0.35);
    }

    /* MAIN */
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #475569;
      margin-bottom: 26px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 30px;
    }

    .actions button {
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: #1e3a8a;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    .actions button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.18);
    }

    thead {
      background: linear-gradient(90deg, #1e3a8a, #3b82f6);
      color: white;
    }

    th, td {
      padding: 16px;
      text-align: center;
      height: 56px;
    }

    tbody tr { background: rgba(248,250,252,0.9); }

    .status { font-weight: 600; color: #065f46; }

    footer {
      margin-top: 70px;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #1f2937;
    }

    @media (max-width: 768px) {
      .app { padding: 38px 22px; }
      header { grid-template-columns: 1fr; text-align: center; }
      .photos { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="app">

  <header>
    <div class="brand">
      <h1>Creative Activity Tracker</h1>
      <p id="today"></p>
    </div>
    <div class="photos">
      <img src="profile.jpg" alt="photo">
      <img src="profile.jpg" alt="photo">
      <img src="profile.jpg" alt="photo">
    </div>
  </header>

  <main>
    <h2>Select Your Current Focus</h2>
    <p class="subtitle">Double click an activity to set it as active</p>

    <div class="actions">
      <button ondblclick="setActivity('Video Editing')">Editing</button>
      <button ondblclick="setActivity('Photography')">Photography</button>
      <button ondblclick="setActivity('Filmmaking')">Filmmaker</button>
      <button ondblclick="setActivity('Coding')">Coding</button>
      <button ondblclick="setActivity('Sleeping')">Sleep</button>
      <button ondblclick="setActivity('Gaming (MLBB)')">MLBB</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Current Creative Focus</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Creative User</td>
          <td id="focus">None</td>
          <td id="status" class="status">Idle</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer>
    “Consistency is more important than intensity.”
  </footer>

</div>

<script>
  const tracker = {
    currentFocus: null,
    status: 'Idle',

    update(focus) {
      if (this.currentFocus === focus && this.status === 'Active') {
        this.status = 'Idle';
        this.currentFocus = null;
      } else {
        this.currentFocus = focus;
        this.status = 'Active';
      }

      document.getElementById('focus').textContent = this.currentFocus ?? 'None';
      document.getElementById('status').textContent = this.status;
    }
  };

  function setActivity(activity) {
    tracker.update(activity);
  }

  const today = new Date();
  document.getElementById('today').textContent = today.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
</script>

</body>
</html>
